<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Home Automation</title>
    <script>
      // SPA fallback for GitHub Pages: encodes the requested path into a query
      // string so index.html can read it and restore the route on load.
      // See: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // ['/Home-Automation/'] keeps the repo prefix
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
